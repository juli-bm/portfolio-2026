name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dsfr/package-lock.json

      - name: Install dsfr dependencies
        working-directory: dsfr
        run: npm ci

      - name: Build dsfr (Vue)
        working-directory: dsfr
        run: npm run build

      - name: Assemble combined site
        run: |
          mkdir -p _site
          cp -r creative/. _site/
          mkdir -p _site/dsfr
          cp -r dsfr/dist/. _site/dsfr/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
